// Auth state değişikliklerini dinle
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('success') === '1') {
    window.history.replaceState({}, '', '/');
    setTimeout(() => location.reload(), 2000);
  }

  if (user) {
    try {
      const { getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const uSnap = await getDoc(doc(db,'users',user.uid));
      // userPlan sabit 'free'
      // Tercih edilen dili oku ve uygula
      const prefLang = uSnap.exists() ? (uSnap.data().prefLang || null) : null;
      if (prefLang && LANG_KEYS.includes(prefLang) && prefLang !== lang) {
        lang = prefLang;
        // Lang bar active state güncelle
        document.querySelectorAll('.lbtn').forEach((btn,i) => {
          btn.classList.toggle('active', LANG_KEYS[i] === lang);
        });
        renderFilters();
        loadAndRender();
      }
      await setDoc(doc(db, 'users', user.uid), {
        email: user.email,
        name: user.displayName,
        photo: user.photoURL,
        lastSeen: Timestamp.now(),
      }, { merge: true });
    } catch(e) {}
    renderAuthArea(user);
  } else {
    renderAuthArea(null);
  }
  updateAds();
});

function renderAuthArea(user) {
  const area = document.getElementById('authArea');
  if (!area) return;
  if (!user) {
    area.innerHTML = `<button class="auth-btn" onclick="window.LF.signIn()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      Sign In
    </button>`;
  } else {
    const planLabel = '';
    area.innerHTML = `<div class="user-menu" id="userMenu">
      <button style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:8px" onclick="toggleUserMenu()">

}

function updateAds() {
  const isPremium = false;
  document.querySelectorAll('.ad-slot, .ad-band, .hero-ad-slot, .ncard-ad').forEach(ad => {
    ad.style.display = isPremium ? 'none' : '';
  });
  const mainAdBand = document.getElementById('mainAdBand');
  if (mainAdBand) mainAdBand.style.display = '';
  // Masaüstü/mobil reklam gösterimi
  const desktopAd = document.querySelector('.adsterra-desktop');
  const mobileAd = document.querySelector('.adsterra-mobile');
  const isMob = window.innerWidth <= 768;
  if (desktopAd) desktopAd.style.display = isMob ? 'none' : '';
  if (mobileAd) mobileAd.style.display = isMob ? '' : 'none';
  // Reader reklamları - panel açıkken göster
  const readerPanel = document.getElementById('readerPanel');
  const isReaderOpen = readerPanel && readerPanel.classList.contains('open');
  const readerHeroAd = document.getElementById('readerHeroAd');
  if (readerHeroAd) readerHeroAd.style.display = isReaderOpen ? '' : 'none';
}

window.toggleUserMenu = () => {
  const dd = document.getElementById('userMenuDd');
  if (dd) dd.classList.toggle('open');
};
document.addEventListener('click', e => {
  const menu = document.getElementById('userMenu');
  if (menu && !menu.contains(e.target)) {
    const dd = document.getElementById('userMenuDd');
    if (dd) dd.classList.remove('open');

});

mium content</li>\n      <li><strong>Security:</strong> Detecting unauthorised access and protecting your account</li>\n      <li><strong>Improvement:</strong> Using anonymised statistics to develop and improve the platform</li>\n    </ul>\n    <p>Your data is <strong>never used</strong> for direct marketing, profiling, or automated decision-making that produces legal or similarly significant effects.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s4\">\n    <div class=\"section-num\">04</div>\n    <h2>Third-Party Services</h2>\n    <p>Your data is never sold. It is shared only with the third-party services strictly necessary for operating the platform:</p>\n    <table class=\"data-table\">\n      <thead><tr><th>Service</th><th>Purpose</th><th>Privacy Policy</th></tr></thead>\n      <tbody>\n        <tr><td><strong>Google Firebase</strong></td><td>Authentication &amp; database</td><td><a href=\"https://policies.google.com/privacy\" target=\"_blank\">policies.google.com</a></td></tr>\n        <tr><td><strong>Cloudflare</strong></td><td>CDN, security, DNS</td><td><a href=\"https://www.cloudflare.com/privacypolicy/\" target=\"_blank\">cloudflare.com</a></td></tr>\n        <tr><td><strong>Stripe</strong></td><td>Payment processing</td><td><a href=\"https://stripe.com/privacy\" target=\"_blank\">stripe.com</a></td></tr>\n        <tr><td><strong>Google Analytics</strong></td><td>Anonymised site statistics</td><td><a href=\"https://policies.google.com/privacy\" target=\"_blank\">policies.google.com</a></td></tr>\n        <tr><td><strong>Anthropic Claude API</strong></td><td>AI news summaries &amp; translation</td><td><a href=\"https://www.anthropic.com/privacy\" target=\"_blank\">anthropic.com</a></td></tr>\n      </tbody>\n    </table>\n    <p>We do not share your data with any other parties except where required by law (e.g. court order or regulatory authority request).</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\" ht to erasure:</strong> Request deletion of your personal data</li>\n      <li><strong>Right to restriction:</strong> Ask us to limit how we process your data</li>\n      <li><strong>Right to object:</strong> Object to the processing of your data</li>\n      <li><strong>Right to portability:</strong> Receive your data in a machine-readable format</li>\n      <li><strong>Right to withdraw consent:</strong> Withdraw consent at any time without affecting prior processing</li>\n    </ul>\n    <div class=\"highlight\"><p>To exercise any of these rights, email <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>. We will respond within 30 days. EU residents may also lodge a complaint with their national data protection authority. Turkish residents may contact the <strong>Personal Data Protection Authority (KVKK)</strong>.</p></div>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s8\">\n    <div class=\"section-num\">08</div>\n    <h2>Children's Privacy</h2>\n    <p>LensFlow is not directed at individuals under the age of 18. We do not knowingly collect personal data from minors. If we become aware that a minor has provided us with personal data, we will delete it promptly.</p>\n    <p>Parents or guardians with concerns should contact us at <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s9\">\n    <div class=\"section-num\">09</div>\n    <h2>Policy Changes</h2>\n    <p>We may update this Privacy Policy from time to time. When we make significant changes, we will notify registered users by email and update the date at the top of this page. Continued use of the platform after changes are published constitutes acceptance of the updated policy.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s10\">\n    <div class=\"section-num\">10</div>\n    <h2>Contact</h2>\n    <p>\ud83d\udce7 <a href=\"mailto:info@lensflow   terms: "<div class=\"page\">\n  <div class=\"doc-label\">Legal</div>\n  <h1 class=\"doc-title\">Terms of Service</h1>\n  <div class=\"doc-meta\"><span>\ud83d\udcc5 Last updated: May 2025</span><span>\ud83c\udf0d Applicable to all users worldwide</span></div>\n\n  <div class=\"toc\">\n    <div class=\"toc-title\">Contents</div>\n    <ol>\n      <li><a href=\"#s1\">About the Service</a></li>\n      <li><a href=\"#s2\">Account Registration &amp; Security</a></li>\n      <li><a href=\"#s3\">Subscription Plans</a></li>\n      <li><a href=\"#s4\">Payments &amp; Refunds</a></li>\n      <li><a href=\"#s5\">Acceptable Use</a></li>\n      <li><a href=\"#s6\">Content &amp; Intellectual Property</a></li>\n      <li><a href=\"#s7\">Disclaimer &amp; Limitation of Liability</a></li>\n      <li><a href=\"#s8\">Service Changes</a></li>\n      <li><a href=\"#s9\">Account Termination</a></li>\n      <li><a href=\"#s10\">Governing Law</a></li>\n      <li><a href=\"#s11\">Contact</a></li>\n    </ol>\n  </div>\n\n  <div class=\"highlight\"><p>By using LensFlow, you agree to these Terms of Service. Please read them carefully. If you have any questions, contact us at <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>.</p></div>\n\n  <div class=\"section\" id=\"s1\">\n    <div class=\"section-num\">01</div>\n    <h2>About the Service</h2>\n    <p>LensFlow (<strong>lensflow.news</strong>) is a global digital news platform that aggregates content from sources worldwide and presents it with AI-powered summaries, multilingual translation, and a personalised news feed.</p>\n    <p>The platform offers:</p>\n    <ul>\n      <li>News aggregation from 200+ sources across 7 languages</li>\n      <li>AI-generated article summaries and translation into 19 languages</li>\n      <li>Free and Premium subscription tiers</li>\n      <li>Access via web browser on desktop and mobile</li>\n    </ul>\n    <p>LensFlow is a news aggregator, not a news publisher. All original content belongs to the respective third-party sources.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s2\">\n    <div class=\"section-num\">02</div>\n    <h2>Account Registration &amp; Security</h2>\n    <p>You may sign in to the platform using your Google account. By registering, you confirm that:</p>\n    <ul>\n      <li>You have read and accepted these Terms of Service and our <a href=\"/privacy.html\">Privacy Policy</a></li>\n      <li>You are at least 18 years of age</li>\n      <li>You are the rightful owner of the Google account used to sign in</li>\n      <li>You are responsible for maintaining the security of your account</li>\n    </ul>\n    <p>If you detect any unauthorised access to your account, notify us immediately at <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s3\">\n    <div class=\"section-num\">03</div>\n    <h2>Subscription Plans</h2>\n    <table class=\"plan-table\">\n      <thead><tr><th>Feature</th><th>Free</th><th>Premium</th></tr></thead>\n      <tbody>\n        <tr><td>News feed &amp; hero slider</td><td class=\"check\">\u2713</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>Categories &amp; filters</td><td class=\"check\">\u2713</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>Language preference saving</td><td class=\"check\">\u2713</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>AI-powered article summaries</td><td class=\"check\">\u2713</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>Article translation (19 languages)</td><td class=\"cross\">\u2717</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>Ad-free experience</td><td class=\"cross\">\u2717</td><td class=\"check\">\u2713</td></tr>\n        <tr><td>Advertisements</td><td>Every 5 articles (mobile)</td><td class=\"check\">None</td></tr>\n      </tbody>\n    </table>\n    <p>Current pricing and payment options are displayed on the subscription page after signing in.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s4\">\n    <div class=\"section-num\">04</div>\n    <h2>Payments &amp; Refunds</h2>\n    <h3>Payments</h3>\n    <p>All payments are securely processed by <strong>Stripe</strong>. Your card details are never stored on LensFlow servers. Subscription fees are charged monthly or annually depending on your chosen plan.</p>\n    <h3>Cancellation</h3>\n    <p>You may cancel your subscription at any time. Cancellation takes effect at the end of the current billing period. You will retain access to Premium features until that date.</p>\n    <h3>Refunds</h3>\n    <div class=\"warn\"><p>Due to the digital nature of the service, refunds are not generally provided for subscription fees already charged. If you experience a technical issue or service failure caused by LensFlow, please contact <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a> and we will assess the situation on a case-by-case basis.</p></div>\n    <h3>Price Changes</h3>\n    <p>If we change subscription pricing, existing subscribers will be notified by email at least 30 days in advance.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s5\">\n    <div class=\"section-num\">05</div>\n    <h2>Acceptable Use</h2>\n    <p>The following activities are strictly prohibited on the platform:</p>\n    <ul>\n      <li>Automated access via bots, scrapers, or crawlers without written permission</li>\n      <li>Attempting to gain unauthorised access to other users' accounts</li>\n      <li>Actions intended to disrupt, overload, or damage LensFlow's infrastructure</li>\n      <li>Copying or redistributing platform content for commercial purposes without permission</li>\n      <li>Creating accounts with false or misleading identity information</li>\n      <li>Any use that violates applicable local or international laws</li>\n    </ul>\n    <p>Violation of these rules may result in immediate account suspension or termination without notice or refund.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s6\">\n    <div class=\"section-num\">06</div>\n    <h2>Content &amp; Intellectual Property</h2>\n    <h3>Third-Party Content</h3>\n    <p>LensFlow aggregates news via RSS feeds from third-party publishers. All original articles, images, and headlines remain the intellectual property of their respective publishers. They are displayed for reference and linking purposes only.</p>\n    <h3>AI Summaries &amp; Translations</h3>\n    <p>Summaries and translations generated by the Anthropic Claude API are provided for informational convenience. They do not replace the original source and no guarantee of accuracy is made. For important decisions, always consult the primary source.</p>\n    <h3>LensFlow Brand</h3>\n    <p>The LensFlow name, logo, and design elements are the property of LensFlow and may not be reproduced or used without prior written permission.</p>\n    <h3>Copyright Notices</h3>\n    <p>If you believe your copyrighted content is being used without authorisation, please send a notice to <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>. Valid requests will be reviewed within 48 hours.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s7\">\n    <div class=\"section-num\">07</div>\n    <h2>Disclaimer &amp; Limitation of Liability</h2>\n    <p>LensFlow accepts no liability for:</p>\n    <ul>\n      <li>The accuracy, completeness, or timeliness of third-party news content</li>\n      <li>Errors in AI-generated summaries or translations</li>\n      <li>Technical failures, service interruptions, or data loss</li>\n      <li>Damages resulting from misuse of the platform by any user</li>\n      <li>The content of any third-party websites linked from the platform</li>\n    </ul>\n    <div class=\"warn\"><p>The platform is provided <strong>\"as is\"</strong> without any warranty of uninterrupted or error-free availability. We will make reasonable efforts to notify users in advance of planned maintenance or significant downtime.</p></div>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s8\">\n    <div class=\"section-num\">08</div>\n    <h2>Service Changes</h2>\n    <p>LensFlow reserves the right to modify features, pricing, or these Terms at any time. When significant changes are made:</p>\n    <ul>\n      <li>This page will be updated with a new effective date</li>\n      <li>Registered users will be notified by email at least 14 days in advance</li>\n      <li>Continued use of the platform after the effective date constitutes acceptance of the revised Terms</li>\n    </ul>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s9\">\n    <div class=\"section-num\">09</div>\n    <h2>Account Termination</h2>\n    <h3>By You</h3>\n    <p>You may delete your account at any time by contacting <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a>. Your personal data will be permanently deleted within 30 days of the request.</p>\n    <h3>By LensFlow</h3>\n    <p>We reserve the right to suspend or permanently terminate accounts that violate these Terms, engage in fraudulent activity, or threaten the security of the platform. In such cases, no refund of remaining subscription fees will be provided.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s10\">\n    <div class=\"section-num\">10</div>\n    <h2>Governing Law</h2>\n    <p>These Terms are governed by the laws of the Republic of Turkey. Any disputes shall be subject to the exclusive jurisdiction of the courts of Istanbul, Turkey.</p>\n    <p>For users residing in the European Union, applicable GDPR provisions and the jurisdiction of the relevant EU member state's courts may also apply where required by law.</p>\n  </div>\n\n  <div class=\"divider\"></div>\n\n  <div class=\"section\" id=\"s11\">\n    <div class=\"section-num\">11</div>\n    <h2>Contact</h2>\n    <p>\ud83d\udce7 <a href=\"mailto:info@lensflow.news\">info@lensflow.news</a><br>\ud83c\udf10 <a href=\"https://lensflow.news\">lensflow.news</a></p>\n  </div>\n</div>",
  css: "\n  *{box-sizing:border-box;margin:0;padding:0}\n  \n  \n  \n  \n  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}\n  .logo-mark{width:48px;height:48px;display:flex;align-items:center;justify-content:center}\n  .logo-mark img{width:100%;height:100%;object-fit:contain}\n  .logo-text{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);letter-spacing:-0.3px}\n  .logo-text span{color:var(--tk)}\n  \n  .nav-back:hover{color:var(--tk)}\n  .page{max-width:760px;margin:0 auto;padding:4rem 2rem 6rem}\n  .doc-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tk);margin-bottom:1rem}\n  .doc-title{font-family:'DM Serif Display',serif;font-size:42px;line-height:1.2;color:var(--text);margin-bottom:1rem}\n  .doc-meta{font-size:13px;color:var(--text3);padding-bottom:2rem;border-bottom:0.5px solid var(--border);margin-bottom:3rem;display:flex;gap:1.5rem;flex-wrap:wrap}\n  .toc{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:1.5rem 2rem;margin-bottom:3rem}\n  .toc-title{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:1rem}\n  .toc ol{padding-left:1.25rem;display:flex;flex-direction:column;gap:6px}\n  .toc a{color:var(--text2);text-decoration:none;font-size:14px;transition:color .15s}\n  .toc a:hover{color:var(--tk)}\n  .section{margin-bottom:3rem;scroll-margin-top:90px}\n  .section-num{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tk);margin-bottom:6px}\n  h2{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:1.25rem;line-height:1.3}\n  h3{font-size:16px;font-weight:500;color:var(--text);margin:1.5rem 0 0.75rem}\n  p{color:var(--text2);margin-bottom:1rem}\n  ul,ol{color:var(--text2);padding-left:1.5rem;margin-bottom:1rem;display:flex;flex-direction:column;gap:4px}\n  li{padding-left:4px}\n  strong{color:var(--text);font-weight:500}\n  a{color:var(--tk);text-decoration:none}\n  a:hover{text-decoration:underline}\n  .data-table{width:100%;border-collapse:collapse;margin:1rem 0 1.5rem;font-size:14px}\n  .data-table th{text-align:left;padding:10px 14px;background:var(--bg3);color:var(--text3);font-weight:500;font-size:12px;letter-spacing:0.5px;border-bottom:0.5px solid var(--border)}\n  .data-table td{padding:10px 14px;border-bottom:0.5px solid var(--border2);color:var(--text2);vertical-align:top}\n  .data-table tr:last-child td{border-bottom:none}\n  .highlight{background:rgba(48,213,200,0.06);border:0.5px solid rgba(48,213,200,0.2);border-radius:10px;padding:1.25rem 1.5rem;margin:1.5rem 0}\n  .highlight p{color:var(--text2);margin:0}\n  .divider{height:0.5px;background:var(--border);margin:3rem 0}\n  footer{text-align:center;padding:2rem;font-size:13px;color:var(--text3);border-top:0.5px solid var(--border)}\n  @media(max-width:640px){.page{padding:2rem 1.25rem 4rem}.doc-title{font-size:28px}}\n"

let globalKaynaklar = null;
async function loadGlobalKaynaklar() {
  if (globalKaynaklar) return globalKaynaklar;
  // localStorage cache — 1 saat geçerli
  try {
    const cached = localStorage.getItem('lf_global_src');
    const cachedTime = localStorage.getItem('lf_global_src_ts');
    if (cached && cachedTime && Date.now() - parseInt(cachedTime) < 3600000) {
      globalKaynaklar = new Set(JSON.parse(cached));
      return globalKaynaklar;
    }
  } catch(e) {}
  // Firestore'dan çek
  try {
    const snap = await getDocs(query(collection(db,'kaynaklar'),where('global','==',true),where('aktif','==',true)));
    globalKaynaklar = new Set(snap.docs.map(d => d.data().isim).filter(Boolean));
    // localStorage'a kaydet
    try {
      localStorage.setItem('lf_global_src', JSON.stringify([...globalKaynaklar]));
      localStorage.setItem('lf_global_src_ts', Date.now().toString());
    } catch(e) {}
  } catch(e) { globalKaynaklar = new Set(); }
  return globalKaynaklar;
}

async function loadNews(langKey) {
  let q;
  if (langKey === 'global') {
    q = query(collection(db,'haberler'),where('global','==',true),orderBy('tarih','desc'),limit(1000));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({id:d.id,...d.data()}));
  } else {
    q = query(collection(db,'haberler'),where('dil','==',langKey),orderBy('tarih','desc'),limit(400));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({id:d.id,...d.data()}));
  }
}
async function loadDigest(langKey) {
  const today = new Date().toISOString().split('T')[0];
  try {
    const q = query(collection(db,'output'),where('lang','==',langKey),where('date','==',today),limit(1));
    const snap = await getDocs(q);
    if (!snap.empty) return snap.docs[0].data();
  } catch(e) {}
  return null;
}

function buildTicker(news) {
  const cfg = LANG_CONFIG[lang];
  document.getElementById('tickerTag').textContent = cfg.ticker;
  const track = document.getElementById('ttrack');
  track.innerHTML = '';
  tOfs = 0;
  if (tRAF) { cancelAnimationFrame(tRAF); tRAF = null; }
  const sonDakika = news.filter(n => n.kategori === 'Son Dakika');
  const diger = news.filter(n => n.kategori !== 'Son Dakika');
  const items = [...sonDakika, ...diger].slice(0, 15);
  function makeChunk() {
    const f = document.createDocumentFragment();
    items.forEach((n, i) => {
      const el = document.createElement('span');
      el.className = 't-item';
      el.innerHTML = `<span class="t-num">${String(i+1).padStart(2,'0')}</span><span class="t-txt">${n.baslik} — ${n.kaynak||''}</span>`;
      f.appendChild(el);
      if (i < items.length-1) { const s = document.createElement('span'); s.className = 't-sep'; f.appendChild(s); }
    });
    return f;
  }
  track.appendChild(makeChunk());
  track.appendChild(makeChunk());
  track.appendChild(makeChunk());
  requestAnimationFrame(() => {
    tW = track.scrollWidth / 3;
    let last = null;
    function step(ts) {
      if (!tPaused) {
        if (last !== null) { tOfs += (ts-last)*0.04; if (tOfs >= tW) tOfs -= tW; }
        last = ts;
        track.style.transform = `translateX(-${tOfs}px)`;
      } else { last = null; }
      tRAF = requestAnimationFrame(step);
    }
    tRAF = requestAnimationFrame(step);
  });
}
document.getElementById('tover').addEventListener('mouseenter', () => tPaused = true);
document.getElementById('tover').addEventListener('mouseleave', () => tPaused = false);

function haberPuanla(news) {
  const simdi = Date.now();
  const altiSaat = 6*3600000, onIkiSaat = 12*3600000;
  const kp = {'Son Dakika':3,'Siyaset':2,'Ekonomi':2,'Teknoloji':1,'Kültür Sanat':1,'Bilim':1,'Spor':1};
  const puanli = news.map(n => {
    let p = 0;
    const yas = simdi - (n.tarih ? n.tarih.toDate().getTime() : 0);
    if (n.gorsel && n.gorsel.trim()) p += 3;
    if (yas < altiSaat) p += 3; else if (yas < onIkiSaat) p += 1;
    p += kp[n.kategori] || 0;
    return {...n, _puan: p};
  });
  puanli.sort((a,b) => b._puan - a._puan);
  const sec = [], ks = {}, kas = {};
  for (const n of puanli) {
    const k = n.kategori||'Genel', ka = n.kaynak||'';
    ks[k] = ks[k]||0; kas[ka] = kas[ka]||0;
    if (ks[k] < 3 && kas[ka] < 2) { sec.push(n); ks[k]++; kas[ka]++; }
    if (sec.length >= 15) break;
  }
  if (sec.length < 15) { for (const n of puanli) { if (!sec.find(s => s.id===n.id)) { sec.push(n); if (sec.length>=15) break; } } }
  return sec;
}

function renderGrid() {
  let base = allNews;
  const cfg = LANG_CONFIG[lang];
  const blocked = window.LF.getBlockedSources();
  if (blocked.size > 0) base = base.filter(n => !blocked.has(n.kaynak));
  if (activeFilter === '__following__') {
    const followed = window.LF.getFollowedSources();
    base = base.filter(n => followed.has(n.kaynak));
  } else if (activeFilter && activeFilter !== 'Tümü') {
    base = base.filter(n => n.kategori === activeFilter);
  }
  if (searchQ) base=base.filter(n=>n.baslik?.toLowerCase().includes(searchQ));
  filteredNews = gridPuanla(base);
  visibleCount = PAGE_SIZE;
  renderCards();
}

function icerikCikar(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html,'text/html');

  // Agresif temizlik — gereksiz her şeyi sil
  const sil = [
    'script','style','nav','header','footer','aside','iframe','form','noscript','template',
    'figure','picture','svg','video','audio','canvas',
    '[class*="ad-"]','[class*="-ad"]','[id*="ad-"]','[class*="banner"]','[class*="promo"]','[class*="sponsor"]',
    '[class*="social"]','[class*="share"]','[class*="follow"]',
    '[class*="facebook"]','[class*="twitter"]','[class*="instagram"]','[class*="linkedin"]','[class*="whatsapp"]',
    '[class*="newsletter"]','[class*="subscribe"]','[class*="signup"]','[class*="register"]','[class*="paywall"]',
    '[class*="breadcrumb"]','[class*="pagination"]','[class*="nav-"]','[class*="-nav"]','[class*="menu"]','[class*="sidebar"]',
    '[class*="author"]','[class*="byline"]','[class*="bio"]','[class*="reporter"]',
    '[class*="related"]','[class*="recommend"]','[class*="more-"]','[class*="also-read"]','[class*="trending"]',
    '[class*="comment"]','[id*="comment"]','[class*="disqus"]',
    '[class*="cookie"]','[class*="gdpr"]','[class*="popup"]','[class*="modal"]','[class*="overlay"]',
    '[class*="widget"]','[class*="logo"]','[class*="brand"]','[class*="tag"]','[class*="label"]','[class*="badge"]',
    '[class*="toolbar"]','[class*="topbar"]','[class*="header"]','[class*="footer"]',
    '[role="complementary"]','[role="navigation"]','[role="banner"]','[role="contentinfo"]','[role="search"]',
    'time','figcaption','.wp-caption','.wp-block-image',
    '.advertisement','.ad-container','.social-buttons','.sharing','.share-bar',
    '.related-articles','.recommended','.author-section','.author-box',
    '.comments-section','.newsletter-signup','.subscription-box',
    '.tags-section','.topics','.article-footer','.story-footer'
  ];
  sil.forEach(sel => { try { doc.querySelectorAll(sel).forEach(el=>el.remove()); } catch(e) {} });

  // Görselleri kaldır
  doc.querySelectorAll('img,svg,video,audio,canvas,picture,source').forEach(el=>el.remove());

  // Linkleri düz metne çevir
  doc.querySelectorAll('a').forEach(a => {
    const span = doc.createElement('span');
    span.textContent = a.textContent;
    a.replaceWith(span);
  });

  // Makale alanını bul (class silinmeden önce arayalım — önce class/id ile)
  const articleSels = [
    '.article-body','.post-content','.entry-content','.story-body',
    '.article-content','.content-body','.article__body','.story__body',
    '.post__content','.news-body','.news-content','.text-content',
    '.body-content','.main-content','.page-content','.article-text',
    '.article__content','.story__content','.post-body',
    'article','[role="main"]','main'
  ];

  let articleEl = null;
  for (const sel of articleSels) {
    const el = doc.querySelector(sel);
    if (el && el.textContent.trim().length > 300) { articleEl = el; break; }
  }

  if (articleEl) {
    // İlk h1'i kaldır (zaten reader başlığında var)
    const ilkH1 = articleEl.querySelector('h1');
    if (ilkH1) ilkH1.remove();
    // Yazar satırlarını kaldır
    articleEl.querySelectorAll('p,span,div').forEach(el => {
      const t = el.textContent.trim();
      if (t.length < 80 && /^(by |written by |author:|from |photo:|image:)/i.test(t)) el.remove();
    });
    return temizle(articleEl);
  }

  // Fallback: uzun paragrafları topla
  const ps = doc.querySelectorAll('p');
  const metinler = Array.from(ps)
    .map(p => p.textContent.trim())
    .filter(t => {
      if (t.length < 80) return false;
      if (/^(cookie|subscribe|newsletter|follow us|sign up|log in|©|all rights|already a member|by )/i.test(t)) return false;
      return true;
    });
  if (metinler.length > 1) return metinler.map(t=>`<p>${t}</p>`).join('');
  return '';
}

function temizle(el) {
  const izinli = new Set(['p','h2','h3','h4','blockquote','ul','ol','li','strong','em','b','i']);

  function temizNode(node) {
    if (node.nodeType === 3) return node.textContent;
    if (node.nodeType !== 1) return '';
    const tag = node.tagName.toLowerCase();
    if (tag === 'h1') return ''; // Başlık zaten üstte
    const children = Array.from(node.childNodes).map(temizNode).join('');
    if (!children.trim()) return '';
    if ((tag === 'p' || tag === 'div') && children.trim().length < 40) return '';
    if (izinli.has(tag)) return `<${tag}>${children}</${tag}>`;
    if (['div','section','article','main'].includes(tag)) {
      const txt = children.trim();
      return txt.length > 60 ? txt : '';
    }
    return children;
  }

  return Array.from(el.childNodes).map(temizNode).join('')
    .replace(/<(p|h[2-4]|li)>\s*<\/\1>/g,'')
    .replace(/  +/g,' ')
    .trim();
}

async function readerRenderTab(tab, haber) {
  const body = document.getElementById('readerBody');
  const cfg = LANG_CONFIG[lang];
  const catMap = CATEGORY_MAP[lang];
  const proxied = proxyImg(haber.gorsel);
  const timeAgo = haber.tarih ? Math.round((Date.now()-(haber.tarih.toDate?haber.tarih.toDate().getTime():new Date(haber.tarih).getTime()))/3600000) : '';
  const catLabel = catMap[haber.kategori]||haber.kategori||'';

  const imgRight = proxied
    ? `<img src="${proxied}" alt="" onerror="this.outerHTML='<div class=reader-hero-right-placeholder></div>'">`
    : '<div class="reader-hero-right-placeholder"></div>';

  const heroHtml = `<div class="reader-hero-split">
    <div class="reader-hero-left">
      <div class="reader-hero-accent"></div>
      <div class="reader-hero-meta">
        <span class="reader-hero-src">${haber.kaynak||''}</span>
        <span class="reader-hero-time">${timeAgo} ${cfg.ago}</span>
        <span class="reader-hero-cat">${catLabel}</span>
      </div>
      <div class="reader-hero-title">${haber.baslik}</div>
    </div>
    <div class="reader-hero-right">${imgRight}</div>
  </div>`;

  const adSlotHtml = `<div id="readerHeroAd" style="width:100%;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);display:flex;justify-content:center;padding:8px 0;background:var(--bg2)"><script>atOptions={'key':'e056319fe13ec5885050eac8fad3674d','format':'iframe','height':250,'width':300,'params':{}};<\/script><script src="https://www.highperformanceformat.com/e056319fe13ec5885050eac8fad3674d/invoke.js"><\/script></div>`;

  const metaHtml = `<div class="reader-content">
    <div class="reader-divider" style="margin-top:0;margin-bottom:1.25rem"></div>`;

  if (tab === 'ozet') {
    const ozetField = 'ozet_'+lang;

    // Cache'den varsa direkt göster (her kullanıcı için)
    if (haber[ozetField]) {
      body.innerHTML = heroHtml + adSlotHtml + metaHtml + `<div class="reader-summary-text">${haber[ozetField]}</div></div>`;
      setTimeout(updateAds, 50);
      return;
    }

    // Özeti yükle
    body.innerHTML = heroHtml + adSlotHtml + metaHtml + `<div class="reader-loading-msg"><div class="spin"></div> ${cfg.ozetLoading}</div></div>`;
    setTimeout(updateAds, 50);
    try {
      const haberId = haber.id || haber.link?.split('/').pop()?.slice(0,100) || '';
      const res = await fetch('https://europe-west1-lensflow-67986.cloudfunctions.net/ozet', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ haberId, baslik: haber.baslik||'', link: haber.link||'', lang })
      });
      if (res.ok) {
        const data = await res.json();
        const ozet = data.ozet||'';
        haber[ozetField] = ozet;
        const el = body.querySelector('.reader-loading-msg');
        if (el) el.outerHTML = `<div class="reader-summary-text">${ozet}</div>`;
      } else {
        const el = body.querySelector('.reader-loading-msg');
        if (el) el.outerHTML = `<div class="reader-summary-text" style="color:var(--text3)">${cfg.ozetErr}</div>`;
      }
    } catch(e) {
      const el = body.querySelector('.reader-loading-msg');
      if (el) el.outerHTML = `<div class="reader-summary-text" style="color:var(--text3)">${cfg.ozetErr}</div>`;
    }
  } else if (tab === 'okuma') {
    body.innerHTML = heroHtml + adSlotHtml + metaHtml + `<div class="reader-loading-msg" id="articleContent"><div class="spin"></div> ${cfg.okumaLoading}</div></div>`;
    const el = document.getElementById('articleContent');

    if (!haber.link || haber.link === '#') {
      if(el) { el.className='reader-article'; el.innerHTML=`<p style="color:var(--text3)">${cfg.okumaErr}</p>`; }
    } else {
      // 1. Adım: Normal proxy ile dene
      let article = '';
      try {
        const res1 = await fetch('https://img.lensflow.news/?url='+encodeURIComponent(haber.link));
        if (res1.ok) {
          const html1 = await res1.text();
          article = icerikCikar(html1);
        }
      } catch(e) {}

      if (article && article.trim().length > 100) {
        // Proxy başarılı
        if(el) { el.className='reader-article'; el.innerHTML=article; }
      } else {
        // 2. Adım: Proxy başarısız — /icerik endpoint'i ile daha agresif dene
        try {
          const res2 = await fetch('https://img.lensflow.news/icerik', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({url: haber.link})
          });
          if (res2.ok) {
            const data2 = await res2.json();
            if (data2.ok && data2.html) {
              article = icerikCikar(data2.html);
            }
          }
        } catch(e) {}

        if (article && article.trim().length > 100) {
          if(el) { el.className='reader-article'; el.innerHTML=article; }
        } else {
          // Her iki yöntem de başarısız — özete yönlendir
          if(el) { el.className='reader-article'; el.innerHTML=`
            <div style="text-align:center;padding:2rem">
              <div style="font-size:32px;margin-bottom:1rem">🔒</div>
              <div style="font-size:15px;color:var(--text3);line-height:1.7;margin-bottom:1.5rem">${cfg.okumaErr}</div>
              <button onclick="window.LF.switchTab('ozet')" style="background:var(--tk);color:#000;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">
                ✦ ${cfg.rdrOzet}
              </button>
            </div>
          `; }
        }
      }
    }
  }
  // Render sonrasi reklam gorunurlugunu guncelle
  setTimeout(updateAds, 50);
}

  async translateReader() {
    const lang = document.getElementById('translateLang').value;
    if (!lang) return; // Dil seçilmedi, çeviri yapma

    const haber = this.currentHaber;
    if (!haber) return;

    const status = document.getElementById('translateStatus');
    if (status) status.textContent = '⏳';

    try {
      // DOM'daki mevcut içeriği al — render edilmiş özet veya makale
    const readerTitle = document.querySelector('.reader-title')?.textContent || haber.baslik || '';
    const readerSummary = document.querySelector('.reader-summary-text')?.textContent || 
                          document.querySelector('.reader-article')?.textContent || 
                          haber.icerik || haber.ozet || '';
    const metin = [readerTitle, readerSummary].filter(Boolean).join('\n\n');

      const response = await fetch('https://europe-west1-lensflow-67986.cloudfunctions.net/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: metin,
          targetLang: lang,
          userId: auth.currentUser?.uid || ''
        })
      });

      const data = await response.json();
      const translated = data.translated || '';
      if (!translated) throw new Error(data.error || 'Çeviri alınamadı');

      const lines = translated.split('\n').filter(l => l.trim());
      const translatedTitle = lines[0] || '';
      const translatedContent = lines.slice(1).join('\n\n') || translated;

      // Orijinal DOM içeriğini sakla
      this._originalTitle = document.querySelector('.reader-title')?.innerHTML;
      this._originalSummary = document.querySelector('.reader-summary-text')?.innerHTML;
      this._originalHaber = { ...haber };

      // DOM'u direkt güncelle — hızlı ve kesin
      const titleEl = document.querySelector('.reader-title');
      const summaryEl = document.querySelector('.reader-summary-text') || document.querySelector('.reader-article');
      if (titleEl && translatedTitle) titleEl.textContent = translatedTitle;
      if (summaryEl && translatedContent) summaryEl.textContent = translatedContent;

      document.getElementById('translateOrigBtn').style.display = '';
      status.textContent = `✓ ${lang} diline çevrildi`;
    } catch(e) {
      status.textContent = '❌ Hata: ' + e.message;
    } finally {
      // btn kaldırıldı
    }
  },

    const titleEl = document.querySelector('.reader-title');

  openBookmarks() {
    document.getElementById('userMenuDd')?.classList.remove('open');
    document.getElementById('bookmarksModal')?.remove();

    let bm = [];
    try { bm = JSON.parse(localStorage.getItem('lf_bookmarks') || '[]'); } catch {}

    const kaydedilenler = this.news.filter(n => bm.includes(n.id));

    const modal = document.createElement('div');
    modal.id = 'bookmarksModal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)';

    const liste = kaydedilenler.length > 0

          </div>`).join('')
      : `<div style="text-align:center;padding:2rem;color:var(--text3);font-size:14px">Henüz kaydedilmiş haber yok.<br>Haber kartlarındaki 🔖 butonunu kullanın.</div>`;

    modal.innerHTML = `
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:1.5rem;width:480px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)">🔖 Kaydedilenler</div>
          <button onclick="document.getElementById('bookmarksModal').remove()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:4px">×</button>

    modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });

  shareNews(idx) {
    const h = this.news[idx];
    if (!h) return;
    if (navigator.share) {
      navigator.share({ title: h.baslik, url: h.link });
    } else {
      navigator.clipboard?.writeText(h.link);
      alert('Link kopyalandı!');
    }
  },

  isBookmarked(id) {
    try {
      const bm = JSON.parse(localStorage.getItem('lf_bookmarks') || '[]');
      return bm.includes(id);
    } catch { return false; }
  },

  toggleBookmark(idx) {
    const h = this.news[idx];
    if (!h) return;
    try {
      let bm = JSON.parse(localStorage.getItem('lf_bookmarks') || '[]');
      const btn = document.getElementById('bm-' + h.id);
      if (bm.includes(h.id)) {
        bm = bm.filter(x => x !== h.id);
        if (btn) { btn.classList.remove('bookmarked'); btn.querySelector('svg path').setAttribute('fill','none'); }
      } else {
        bm.push(h.id);
        if (btn) { btn.classList.add('bookmarked'); btn.querySelector('svg path').setAttribute('fill','currentColor'); }
      }
      localStorage.setItem('lf_bookmarks', JSON.stringify(bm));
    } catch(e) {}
  },

  async signOut() {
    try { await signOut(auth); } catch(e) {}
  },

  setFilter(f) {
    activeFilter = (f==='Tümü'||f===LANG_CONFIG[lang].allKey) ? null : f;
    document.querySelectorAll('.fbtn').forEach(b => {
      const key = b.getAttribute('onclick').match(/'([^']+)'/)?.[1];
      b.classList.toggle('active', key===f || (f==='Tümü' && key==='Tümü'));
    });
    renderGrid();
  },

  getFollowedSources() {
    try { return new Set(JSON.parse(localStorage.getItem('lf_followed_src') || '[]')); }
    catch { return new Set(); }
  },

  toggleFollow(kaynak) {
    if (!kaynak) return;
    try {
      let followed = JSON.parse(localStorage.getItem('lf_followed_src') || '[]');
      if (followed.includes(kaynak)) {
        followed = followed.filter(k => k !== kaynak);
      } else {
        followed.push(kaynak);
      }
      localStorage.setItem('lf_followed_src', JSON.stringify(followed));
    } catch {}
    renderFilters();
    renderGrid();
  },

    document.getElementById('userMenuDd')?.classList.remove('open');
    // Mevcut modalı temizle
    document.getElementById('langPrefModal')?.remove();
    const LANG_LIST = [
      {k:'global', flag:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f30d.svg', name:'Global'},

      {k:'de',     flag:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f1e9-1f1ea.svg', name:'Deutsch'},

    ];
    const modal = document.createElement('div');
    modal.id = 'langPrefModal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)';
    modal.innerHTML = `
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:2rem;width:320px;max-width:90vw">
        <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:6px">Varsayılan Dil</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:1.5rem">Siteye her girdiğinizde bu dil açılacak.</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${LANG_LIST.map(l=>`
            <button onclick="window.LF.saveLangPref('${l.k}')" style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:${l.k===lang?'rgba(48,213,200,0.1)':'var(--bg3)'};border:0.5px solid ${l.k===lang?'var(--tk)':'var(--border)'};border-radius:10px;cursor:pointer;color:${l.k===lang?'var(--tk)':'var(--text)'};font-size:14px;font-family:'DM Sans',sans-serif;text-align:left;width:100%;transition:all .15s">
              <img src="${l.flag}" style="width:20px;height:20px;object-fit:contain" alt="">

        </div>
        <button onclick="document.getElementById('langPrefModal').remove()" style="margin-top:1.25rem;width:100%;padding:9px;background:transparent;border:0.5px solid var(--border);border-radius:8px;color:var(--text3);font-size:13px;cursor:pointer">İptal</button>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  },

  async loadOzet() {
    const haber = this.currentHaber;
    if (!haber) return;
    const cfg = LANG_CONFIG[lang];
    const ozetField = 'ozet_'+lang;
    const wrap = document.getElementById('ozetLoadWrap');
    if (wrap) wrap.innerHTML = `<div class="reader-loading-msg"><div class="spin"></div> ${cfg.ozetLoading}</div>`;
    try {
      const haberId = haber.id || haber.link?.split('/').pop()?.slice(0,100) || '';
      const res = await fetch('https://europe-west1-lensflow-67986.cloudfunctions.net/ozet', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ haberId, baslik: haber.baslik||'', link: haber.link||'', lang })
      });
      if (res.ok) {
        const data = await res.json();
        const ozet = data.ozet||'';
        haber[ozetField] = ozet;
        if (wrap) wrap.outerHTML = `<div class="reader-summary-text">${ozet}</div>`;
      } else {
        if (wrap) wrap.innerHTML = `<div style="color:var(--text3)">${cfg.ozetErr}</div>`;
      }
    } catch(e) {
      if (wrap) wrap.innerHTML = `<div style="color:var(--text3)">${cfg.ozetErr}</div>`;
    }
  },

  async saveLangPref(l) {
    document.getElementById('langPrefModal')?.remove();
    await window.setLang(l);
  }
};

async function loadAndRender() {
  document.getElementById('grid').innerHTML=`<div class="loading"><div class="spin"></div></div>`;
  document.getElementById('heroTrack').innerHTML=`<div class="hero-slide"><div class="loading"><div class="spin"></div></div></div>`;
  try {
    [allNews, digestData] = await Promise.all([loadNews(lang), loadDigest(lang)]);
    const blocked = window.LF.getBlockedSources();
    const heroNews = haberPuanla(allNews.filter(n => !blocked.has(n.kaynak)));
    buildTicker(allNews);
    buildHero(heroNews);
    renderFilters();
    renderGrid();
    renderDigest();
  } catch(e) {
    console.error(e);
    document.getElementById('grid').innerHTML=`<div class="no-results">Veri yüklenemedi: ${e.message}</div>`;
  }
}

document.getElementById('navDate').textContent = new Date().toLocaleDateString(LOCALES[lang],{day:'numeric',month:'short',year:'numeric'});
loadAndRender();
