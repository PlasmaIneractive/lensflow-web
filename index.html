<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LensFlow — Global News</title>
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="192x192" href="logo192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--tk:#30D5C8;--tk-dim:rgba(48,213,200,0.12);--tk-dark:#1aa89d;--bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.05);--text:#e8e4dc;--text2:#9a968f;--text3:#5a5650}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.navbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:82px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.logo-mark{width:52px;height:52px;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:contain}
.logo-text{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);letter-spacing:-0.3px}
.logo-text span{color:var(--tk)}
.search-wrap{display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--border);padding:6px 0;flex:1;max-width:420px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--tk)}
.search-icon{opacity:.35;width:16px;height:16px;border:1.5px solid var(--text);border-radius:50%;position:relative;flex-shrink:0}
.search-icon::after{content:'';position:absolute;width:4px;height:1.5px;background:var(--text);bottom:-3.5px;right:-3px;transform:rotate(45deg);border-radius:1px}
.search-input{border:none;background:transparent;font-size:15px;color:var(--text);outline:none;width:100%;font-family:'DM Sans',sans-serif}
.search-input::placeholder{color:var(--text3)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-date{font-size:13px;color:var(--text3);font-family:monospace;white-space:nowrap}
.lang-dd{position:relative}
.lang-btn{display:flex;align-items:center;gap:7px;background:var(--bg3);border:0.5px solid var(--border);border-radius:24px;padding:8px 16px;cursor:pointer;font-size:14px;color:var(--text);white-space:nowrap;transition:border-color .15s;font-family:'DM Sans',sans-serif}
.lang-btn:hover{border-color:var(--tk)}
.lang-arr{width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:3px solid var(--text3);transition:transform .15s}
.lang-btn.open .lang-arr{transform:rotate(180deg)}
.lang-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;min-width:150px;display:none;z-index:200}
.lang-menu.open{display:block}
.loption{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:0.5px solid var(--border2);transition:all .1s}
.loption:last-child{border-bottom:none}
.loption:hover{background:var(--bg3);color:var(--text)}
.loption.active{color:var(--tk)}
.loflag{font-size:14px;width:18px;text-align:center}
.loname{flex:1}
.lochk{width:6px;height:6px;border-radius:50%;background:var(--tk);display:none;flex-shrink:0}
.loption.active .lochk{display:block}
.ticker{background:var(--bg2);border-bottom:0.5px solid var(--border);overflow:hidden;height:48px;display:flex;align-items:center}
.ticker-tag{background:var(--tk);color:#0a3a38;font-size:13px;font-weight:500;padding:0 10px 0 12px;height:100%;display:flex;align-items:center;flex-shrink:0;position:relative;letter-spacing:1px;text-transform:uppercase}
.ticker-tag::after{content:'';position:absolute;right:-9px;top:0;width:0;height:0;border-top:48px solid transparent;border-left:9px solid var(--tk)}
.ticker-overflow{overflow:hidden;flex:1;margin-left:14px;height:100%;display:flex;align-items:center;cursor:default}
.ticker-track{display:flex;align-items:center;will-change:transform;white-space:nowrap}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 4px;flex-shrink:0}
.t-num{font-size:13px;color:var(--tk);font-weight:500;font-family:monospace}
.t-txt{font-size:15px;color:var(--text2)}
.t-sep{display:inline-block;width:1px;height:14px;background:var(--border);margin:0 12px;vertical-align:middle;flex-shrink:0}
.ad-band{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:8px 2rem;display:flex;flex-direction:column;align-items:center;gap:5px}
.ad-label-row{display:flex;align-items:center;gap:8px;width:100%;max-width:728px}
.ad-line{flex:1;height:0.5px;background:var(--border)}
.ad-label-txt{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.ad-slot{width:100%;max-width:728px;height:90px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center}
.ad-slot-txt{font-size:12px;color:var(--text3);font-family:monospace}
.hero{background:var(--bg2);border-bottom:0.5px solid var(--border);position:relative;overflow:hidden}
.hero-track-wrap{overflow:visible;cursor:grab;user-select:none;position:relative;z-index:1}
.hero-track-wrap:active{cursor:grabbing}
.hero-track{display:flex;transition:transform .42s cubic-bezier(.25,.46,.45,.94)}
.hero-slide{flex:0 0 calc(100% - 100px);position:relative;height:600px;overflow:hidden;background:var(--bg3);border-radius:12px;margin:0 50px;cursor:pointer}
.hero-slide.ad-slide{display:flex;align-items:center;justify-content:center;height:120px;background:var(--bg2);cursor:default}
.hero-img{position:absolute;inset:0;width:100%;height:100%}
.hero-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.hero-img-placeholder{position:absolute;inset:0;background:var(--bg3)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.5) 50%,rgba(0,0,0,0.05) 100%);z-index:1}
.hero-text{position:absolute;bottom:0;left:0;right:0;padding:2rem 3rem;z-index:2}
.hero-prev,.hero-next{position:absolute;top:0;width:50px;height:100%;border:none;background:rgba(15,15,15,0.6);backdrop-filter:blur(4px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,0.6);transition:all .15s;z-index:10}
.hero-prev{left:0}
.hero-next{right:0}
.hero-prev:hover,.hero-next:hover{color:var(--tk);background:rgba(15,15,15,0.85)}
.hero-accent{width:24px;height:2px;background:var(--tk);border-radius:2px;margin-bottom:8px}
.hero-rank{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px;font-family:monospace;letter-spacing:.5px}
.hero-title{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;line-height:1.3;margin-bottom:10px;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.hero-meta{display:flex;align-items:center;gap:10px}
.hero-src{font-size:12px;font-weight:500;color:var(--tk)}
.hero-time{font-size:12px;color:rgba(255,255,255,0.45)}
.hero-ad-slot{width:100%;max-width:728px;height:90px;background:var(--bg3);border:0.5px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;gap:10px}
.hero-ad-tag{font-size:9px;color:var(--text3);border:0.5px solid var(--border);padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:1px}
.hero-ad-txt{font-size:12px;color:var(--text3);font-family:monospace}
.hero-controls{display:flex;align-items:center;justify-content:center;gap:1rem;padding:8px 2rem;border-top:0.5px solid var(--border2)}
.hero-dots{display:flex;gap:4px;align-items:center}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.hdot.active{width:16px;border-radius:3px;background:var(--tk)}
.hdot.ad-dot{background:rgba(48,213,200,.2)}
.hdot.ad-dot.active{background:var(--tk);opacity:.6}
.hero-counter{font-size:10px;color:var(--text3);font-family:monospace}
.filter-row{display:flex;align-items:center;justify-content:space-between;gap:0;padding:0 2rem;scrollbar-width:none;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{font-size:14px;padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex:1;font-weight:700;letter-spacing:0.3px;text-align:center;margin:8px 4px}
.fbtn:hover{border-color:var(--tk);color:var(--text);background:var(--bg3)}
.fbtn.active{background:var(--tk);color:#0a3a38;border-color:var(--tk);font-weight:700}
.digest-band{background:var(--bg2);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:1rem 2rem;display:flex;align-items:flex-start;gap:2rem;overflow-x:auto;scrollbar-width:none}
.digest-band::-webkit-scrollbar{display:none}
.digest-left{flex-shrink:0;min-width:160px}
.dlbl{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap}
.ddot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--tk);margin-right:6px;flex-shrink:0}
.ddate{font-size:10px;color:var(--text3);font-family:monospace;display:block;margin-top:2px}
.dtlbl{font-size:9px;color:var(--tk-dark);text-transform:uppercase;letter-spacing:1px;margin-top:8px;margin-bottom:3px}
.dtxt{font-size:12px;color:var(--text);font-style:italic;line-height:1.4;max-width:200px}
.digest-stories{display:flex;gap:1rem;align-items:flex-start}
.dstory{display:flex;gap:6px;align-items:flex-start;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;min-width:200px;max-width:240px;flex-shrink:0}
.drank{font-size:10px;color:var(--tk);font-weight:500;min-width:14px;margin-top:1px;flex-shrink:0;font-family:monospace}
.dstitle{font-size:12px;color:var(--text2);line-height:1.4}
.content{display:grid;grid-template-columns:1fr;gap:1.5rem;padding:1rem 2rem 2rem}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ncard{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:border-color .15s}
.ncard:hover{border-color:var(--tk)}
.ncard-body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
.ncat{font-size:10px;color:var(--tk);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:5px}
.ntitle{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);line-height:1.4;margin-bottom:5px}
.nmeta{display:flex;align-items:center;gap:8px}
.nsrc{font-size:11px;color:var(--tk);font-weight:500}
.ntime{font-size:11px;color:var(--text3)}
.nimg{background:var(--bg3);overflow:hidden;flex-shrink:0}
.nimg img{width:100%;height:160px;object-fit:cover;display:block}
.no-results{font-size:13px;color:var(--text3);padding:2rem 0;text-align:center}
.mobile-search{display:none;align-items:center;gap:8px;background:var(--bg2);border-bottom:0.5px solid var(--border);padding:8px 1rem}
.mobile-search .search-wrap{display:flex;flex:1;max-width:none;border-bottom:1px solid var(--border)}
.ncard-ad{background:var(--bg2);border:0.5px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:120px;grid-column:1/-1;width:100%}
.ncard-ad-label{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.ncard-ad-slot{font-size:12px;color:var(--text3);font-family:monospace}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text3);font-size:13px;gap:10px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--tk);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* READER */
.reader-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.reader-overlay.open{opacity:1;pointer-events:all}
.reader-panel{position:fixed;top:0;right:0;width:min(680px,100vw);height:100vh;background:var(--bg2);z-index:9999;transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;border-left:0.5px solid var(--border)}
.reader-panel.open{transform:translateX(0)}
.reader-header{padding:1rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.reader-logo{font-family:'DM Serif Display',serif;font-size:16px;color:var(--tk)}
.reader-close{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .15s}
.reader-close:hover{border-color:var(--tk);color:var(--tk)}
.reader-tabs{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0}
.reader-tab{flex:1;padding:12px 8px;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.reader-tab:hover{color:var(--text);background:var(--bg3)}
.reader-tab.active{color:var(--tk);border-bottom-color:var(--tk)}
.reader-body{overflow-y:auto;flex:1}
.reader-hero{width:100%;height:280px;object-fit:cover;display:block;background:var(--bg3)}
.reader-hero-placeholder{width:100%;height:280px;background:var(--bg3)}
.reader-content{padding:1.5rem}
.reader-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.reader-src{font-size:12px;font-weight:600;color:var(--tk)}
.reader-time{font-size:12px;color:var(--text3)}
.reader-cat{font-size:10px;color:var(--text3);background:var(--bg3);border:0.5px solid var(--border);padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:1px}
.reader-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);line-height:1.35;margin-bottom:1.5rem}
.reader-divider{height:0.5px;background:var(--border);margin-bottom:1.5rem}
.reader-article{font-size:16px;color:var(--text2);line-height:1.9;font-family:'DM Sans',sans-serif;max-width:640px;margin:0 auto}
.reader-article p{margin-bottom:1.2rem;color:var(--text2)}
.reader-article h1,.reader-article h2{font-family:'DM Serif Display',serif;color:var(--text);margin:1.6rem 0 0.8rem;line-height:1.3}
.reader-article h1{font-size:22px}
.reader-article h2{font-size:19px}
.reader-article h3,.reader-article h4{font-size:16px;font-weight:600;color:var(--text);margin:1.2rem 0 0.5rem}
.reader-article blockquote{border-left:3px solid var(--tk);margin:1.2rem 0;padding:0.6rem 1.2rem;color:var(--text3);font-style:italic;background:var(--bg3);border-radius:0 6px 6px 0}
.reader-article ul,.reader-article ol{margin:0.8rem 0 1rem 1.4rem;color:var(--text2)}
.reader-article li{margin-bottom:0.4rem}
.reader-article strong,.reader-article b{color:var(--text);font-weight:600}
.reader-article em,.reader-article i{color:var(--text2)}
.reader-article a{color:var(--text2);text-decoration:none;pointer-events:none}
.reader-summary-text{font-size:16px;color:var(--text2);line-height:1.9;font-family:'DM Sans',sans-serif;max-width:640px;margin:0 auto}
.reader-summary-text p{margin-bottom:1rem}
.reader-loading-msg{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:1rem 0}
.reader-footer{padding:1rem 1.5rem;border-top:0.5px solid var(--border);flex-shrink:0}
.reader-btn{display:block;width:100%;padding:12px;background:var(--tk);color:#0a3a38;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;text-decoration:none;transition:opacity .15s}
.reader-btn:hover{opacity:0.85}
.sidebar{display:none}
@media(max-width:1024px) and (min-width:769px){
  .search-wrap{display:none}.mobile-search{display:flex}
  .hero-slide{height:320px}.hero-text{padding:1.5rem 2rem}
  .content{padding:1rem 1.5rem 1.5rem}.navbar{padding:0 1.25rem;height:70px}
  .news-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .hero-prev,.hero-next{display:none}.search-wrap{display:none}.mobile-search{display:flex}
  .navbar{padding:0 1rem;gap:8px;height:60px}.logo-text{font-size:18px}
  .logo-mark{width:28px;height:28px}.nav-date{display:none}.lang-btn{padding:5px 10px;font-size:12px}
  .ticker{height:38px}.ticker-tag::after{border-top:38px solid transparent}
  .ad-band{padding:6px 1rem}.ad-slot{height:50px}
  .hero-slide{height:260px}.hero-title{font-size:20px}.hero-text{padding:1.25rem 1.25rem}
  .hero-controls{padding:6px 1rem}.filter-row{padding:.75rem 1rem}
  .content{padding:0 1rem 1.5rem}.news-grid{grid-template-columns:1fr}.ncard-ad{height:80px}
  .reader-panel{width:100vw}
}
</style>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="/">
    <div class="logo-mark"><img src="logo.png" alt="LensFlow"></div>
    <span class="logo-text">Lens<span>Flow</span></span>
  </a>
  <div class="search-wrap">
    <div class="search-icon"></div>
    <input class="search-input" id="srch" type="text" placeholder="Search news..." oninput="doSearch(this.value)">
  </div>
  <div class="nav-right">
    <span class="nav-date" id="navDate"></span>
    <div class="lang-dd" id="ldd">
      <button class="lang-btn" id="ltrig" onclick="toggleMenu()">
        <span id="tFlag">🌍</span><span id="tName">Global</span><span class="lang-arr"></span>
      </button>
      <div class="lang-menu" id="lmenu">
        <div class="loption active" onclick="setLang('global')"><span class="loflag">🌍</span><span class="loname">Global</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('en')"><span class="loflag">🇬🇧</span><span class="loname">English</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('fr')"><span class="loflag">🇫🇷</span><span class="loname">Français</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('de')"><span class="loflag">🇩🇪</span><span class="loname">Deutsch</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('es')"><span class="loflag">🇪🇸</span><span class="loname">Español</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('pt')"><span class="loflag">🇧🇷</span><span class="loname">Português</span><span class="lochk"></span></div>
        <div class="loption" onclick="setLang('tr')"><span class="loflag">🇹🇷</span><span class="loname">Türkçe</span><span class="lochk"></span></div>
      </div>
    </div>
  </div>
</nav>
<div class="mobile-search">
  <div class="search-wrap" style="flex:1;max-width:none">
    <div class="search-icon"></div>
    <input class="search-input" id="srchMobile" type="text" placeholder="Search news..." oninput="doSearch(this.value)">
  </div>
</div>
<div class="ticker">
  <div class="ticker-tag" id="tickerTag">LIVE</div>
  <div class="ticker-overflow" id="tover">
    <div class="ticker-track" id="ttrack"></div>
  </div>
</div>
<div class="ad-band">
  <div class="ad-label-row"><div class="ad-line"></div><span class="ad-label-txt">Reklam</span><div class="ad-line"></div></div>
  <div class="ad-slot"><span class="ad-slot-txt">728 × 90</span></div>
</div>
<div class="hero">
  <div class="hero-track-wrap" id="heroWrap">
    <div class="hero-track" id="heroTrack">
      <div class="hero-slide"><div class="loading"><div class="spin"></div></div></div>
    </div>
  </div>
  <button class="hero-prev" onclick="heroGo(-1)">←</button>
  <button class="hero-next" onclick="heroGo(1)">→</button>
  <div class="hero-controls">
    <div class="hero-dots" id="heroDots"></div>
    <span class="hero-counter" id="heroCounter"></span>
  </div>
</div>
<div class="filter-row" id="filters"></div>
<div class="digest-band" id="digestBand" style="display:none">

// Global kaynakların listesi — Firebase'de global:true olan kaynaklar
let globalKaynaklar = null;
async function loadGlobalKaynaklar() {
  if (globalKaynaklar) return globalKaynaklar;
  try {
    const snap = await getDocs(query(collection(db,'kaynaklar'),where('global','==',true),where('aktif','==',true)));
    globalKaynaklar = new Set(snap.docs.map(d => d.data().isim).filter(Boolean));
  } catch(e) { globalKaynaklar = new Set(); }
  return globalKaynaklar;
}

async function loadNews(langKey) {
  let q;
  if (langKey === 'global') {
    q = query(collection(db,'haberler'),orderBy('tarih','desc'),limit(500));
    const snap = await getDocs(q);
    const globalSrc = await loadGlobalKaynaklar();
    // Sadece global kaynaklardan gelen haberleri filtrele + Türkçe haberleri çıkar
    return snap.docs
      .map(d => ({id:d.id,...d.data()}))
      .filter(h => globalSrc.has(h.kaynak) && h.dil === 'en');
  } else {
    q = query(collection(db,'haberler'),where('dil','==',langKey),orderBy('tarih','desc'),limit(500));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({id:d.id,...d.data()}));
  }
}
async function loadDigest(langKey) {
  const today = new Date().toISOString().split('T')[0];
  try {
    const q = query(collection(db,'output'),where('lang','==',langKey),where('date','==',today),limit(1));
    const snap = await getDocs(q);
    if (!snap.empty) return snap.docs[0].data();
  } catch(e) {}
  return null;
}

function buildTicker(news) {
  const cfg = LANG_CONFIG[lang];
  document.getElementById('tickerTag').textContent = cfg.ticker;
  const track = document.getElementById('ttrack');
  track.innerHTML = '';
  tOfs = 0;
  if (tRAF) { cancelAnimationFrame(tRAF); tRAF = null; }
  const sonDakika = news.filter(n => n.kategori === 'Son Dakika');
  const diger = news.filter(n => n.kategori !== 'Son Dakika');
  const items = [...sonDakika, ...diger].slice(0, 15);
  function makeChunk() {
    const f = document.createDocumentFragment();
    items.forEach((n, i) => {
      const el = document.createElement('span');
      el.className = 't-item';
      el.innerHTML = `<span class="t-num">${String(i+1).padStart(2,'0')}</span><span class="t-txt">${n.baslik} — ${n.kaynak||''}</span>`;
      f.appendChild(el);
      if (i < items.length-1) { const s = document.createElement('span'); s.className = 't-sep'; f.appendChild(s); }
    });
    return f;
  }
  track.appendChild(makeChunk());
  track.appendChild(makeChunk());
  track.appendChild(makeChunk());
  requestAnimationFrame(() => {
    tW = track.scrollWidth / 3;
    let last = null;
    function step(ts) {
      if (!tPaused) {
        if (last !== null) { tOfs += (ts-last)*0.04; if (tOfs >= tW) tOfs -= tW; }
        last = ts;
        track.style.transform = `translateX(-${tOfs}px)`;
      } else { last = null; }
      tRAF = requestAnimationFrame(step);
    }
    tRAF = requestAnimationFrame(step);
  });
}
document.getElementById('tover').addEventListener('mouseenter', () => tPaused = true);
document.getElementById('tover').addEventListener('mouseleave', () => tPaused = false);

function haberPuanla(news) {
  const simdi = Date.now();
  const altiSaat = 6*3600000, onIkiSaat = 12*3600000;
  const kp = {'Son Dakika':3,'Siyaset':2,'Ekonomi':2,'Teknoloji':1,'Kültür Sanat':1,'Bilim':1,'Spor':1};
  const puanli = news.map(n => {
    let p = 0;
    const yas = simdi - (n.tarih ? n.tarih.toDate().getTime() : 0);
    if (n.gorsel && n.gorsel.trim()) p += 3;
    if (yas < altiSaat) p += 3; else if (yas < onIkiSaat) p += 1;
    p += kp[n.kategori] || 0;
    return {...n, _puan: p};
  });
  puanli.sort((a,b) => b._puan - a._puan);
  const sec = [], ks = {}, kas = {};
  for (const n of puanli) {
    const k = n.kategori||'Genel', ka = n.kaynak||'';
    ks[k] = ks[k]||0; kas[ka] = kas[ka]||0;
    if (ks[k] < 3 && kas[ka] < 2) { sec.push(n); ks[k]++; kas[ka]++; }
    if (sec.length >= 15) break;
  }
  if (sec.length < 15) { for (const n of puanli) { if (!sec.find(s => s.id===n.id)) { sec.push(n); if (sec.length>=15) break; } } }
  return sec;
}

    if ((i+1)===5||(i+1)===10) heroSlides.push({type:'ad',adNum:Math.floor((i+1)/5)});
  });
  heroSlides.forEach((s, i) => {
    const slide = document.createElement('div');
    if (s.type === 'ad') {
      slide.className = 'hero-slide ad-slide';

      slide.className = 'hero-slide';
      const proxied = proxyImg(s.gorsel);

      slide.innerHTML = `

        </div>`;
      const heroI = i;
      slide.onclick = () => window.LF.openReader(heroSlides[heroI]);
    }
    track.appendChild(slide);

function updateHero() {

  const total = heroSlides.filter(s => s.type==='news').length;

  document.getElementById('heroCounter').textContent = heroSlides[heroIdx]?.type==='ad' ? 'AD' : `${cur} / ${total}`;
}
function heroGoTo(i) { heroIdx=i; updateHero(); clearInterval(heroTimer); heroTimer=setInterval(()=>{heroIdx=(heroIdx+1)%heroSlides.length;updateHero();},5000); }

}

function renderCards() {
  const cfg = LANG_CONFIG[lang];
  const catMap = CATEGORY_MAP[lang];
  const grid = document.getElementById('grid');
  if (!filteredNews.length) { grid.innerHTML=`<div class="no-results">Sonuç bulunamadı.</div>`; return; }
  const visible = filteredNews.slice(0, visibleCount);
  let html = '';
  visible.forEach((n, i) => {
    if (i>0 && i%18===0) html+=`<div class="ncard-ad"><span class="ncard-ad-label">Reklam</span><span class="ncard-ad-slot">728×90</span></div>`;
    const timeAgo = n.tarih ? Math.round((Date.now()-n.tarih.toDate().getTime())/3600000) : '';
    const catLabel = catMap[n.kategori]||n.kategori||'';
    const proxied = proxyImg(n.gorsel);
    html+=`<div class="ncard" onclick="window.LF.openReader(window.LF.news[${i}])">
      <div class="nimg">${proxied?`<img src="${proxied}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">`:''}</div>
      <div class="ncard-body">
        <div class="ncat">${catLabel}</div>
        <div class="ntitle">${n.baslik}</div>
        <div class="nmeta" style="margin-top:auto;padding-top:8px"><span class="nsrc">${n.kaynak||''}</span><span class="ntime">${timeAgo} ${cfg.ago}</span></div>
      </div>
    </div>`;
  });
  if (visibleCount < filteredNews.length) {
    html+=`<div style="grid-column:1/-1;height:10px" id="infiniteAnchor"></div>`;
  }
  grid.innerHTML = html;
  window.LF.news = filteredNews;
  const anchor = document.getElementById('infiniteAnchor');
  if (anchor) {
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { obs.disconnect(); visibleCount+=PAGE_SIZE; renderCards(); }
    }, {rootMargin:'200px'});
    obs.observe(anchor);
  }
}

// ── READER ────────────────────────────────────────────────────────
function icerikCikar(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html,'text/html');

  // Agresif temizlik — gereksiz her şeyi sil
  const sil = [
    'script','style','nav','header','footer','aside','iframe','form','noscript','template',
    'figure','picture','svg','video','audio','canvas',
    '[class*="ad-"]','[class*="-ad"]','[id*="ad-"]','[class*="banner"]','[class*="promo"]','[class*="sponsor"]',
    '[class*="social"]','[class*="share"]','[class*="follow"]',
    '[class*="facebook"]','[class*="twitter"]','[class*="instagram"]','[class*="linkedin"]','[class*="whatsapp"]',
    '[class*="newsletter"]','[class*="subscribe"]','[class*="signup"]','[class*="register"]','[class*="paywall"]',
    '[class*="breadcrumb"]','[class*="pagination"]','[class*="nav-"]','[class*="-nav"]','[class*="menu"]','[class*="sidebar"]',
    '[class*="author"]','[class*="byline"]','[class*="bio"]','[class*="reporter"]',
    '[class*="related"]','[class*="recommend"]','[class*="more-"]','[class*="also-read"]','[class*="trending"]',
    '[class*="comment"]','[id*="comment"]','[class*="disqus"]',
    '[class*="cookie"]','[class*="gdpr"]','[class*="popup"]','[class*="modal"]','[class*="overlay"]',
    '[class*="widget"]','[class*="logo"]','[class*="brand"]','[class*="tag"]','[class*="label"]','[class*="badge"]',
    '[class*="toolbar"]','[class*="topbar"]','[class*="header"]','[class*="footer"]',
    '[role="complementary"]','[role="navigation"]','[role="banner"]','[role="contentinfo"]','[role="search"]',
    'time','figcaption','.wp-caption','.wp-block-image',
    '.advertisement','.ad-container','.social-buttons','.sharing','.share-bar',
    '.related-articles','.recommended','.author-section','.author-box',
    '.comments-section','.newsletter-signup','.subscription-box',
    '.tags-section','.topics','.article-footer','.story-footer'
  ];
  sil.forEach(sel => { try { doc.querySelectorAll(sel).forEach(el=>el.remove()); } catch(e) {} });

  // Görselleri kaldır
  doc.querySelectorAll('img,svg,video,audio,canvas,picture,source').forEach(el=>el.remove());

  // Linkleri düz metne çevir
  doc.querySelectorAll('a').forEach(a => {
    const span = doc.createElement('span');
    span.textContent = a.textContent;
    a.replaceWith(span);
  });

  // Makale alanını bul (class silinmeden önce arayalım — önce class/id ile)
  const articleSels = [
    '.article-body','.post-content','.entry-content','.story-body',
    '.article-content','.content-body','.article__body','.story__body',
    '.post__content','.news-body','.news-content','.text-content',
    '.body-content','.main-content','.page-content','.article-text',
    '.article__content','.story__content','.post-body',
    'article','[role="main"]','main'
  ];

  let articleEl = null;
  for (const sel of articleSels) {
    const el = doc.querySelector(sel);
    if (el && el.textContent.trim().length > 300) { articleEl = el; break; }
  }

  if (articleEl) {
    // İlk h1'i kaldır (zaten reader başlığında var)
    const ilkH1 = articleEl.querySelector('h1');
    if (ilkH1) ilkH1.remove();
    // Yazar satırlarını kaldır
    articleEl.querySelectorAll('p,span,div').forEach(el => {
      const t = el.textContent.trim();
      if (t.length < 80 && /^(by |written by |author:|from |photo:|image:)/i.test(t)) el.remove();
    });
    return temizle(articleEl);
  }

  // Fallback: uzun paragrafları topla
  const ps = doc.querySelectorAll('p');
  const metinler = Array.from(ps)
    .map(p => p.textContent.trim())
    .filter(t => {
      if (t.length < 80) return false;
      if (/^(cookie|subscribe|newsletter|follow us|sign up|log in|©|all rights|already a member|by )/i.test(t)) return false;
      return true;
    });
  if (metinler.length > 1) return metinler.map(t=>`<p>${t}</p>`).join('');
  return '';
}

function temizle(el) {
  const izinli = new Set(['p','h2','h3','h4','blockquote','ul','ol','li','strong','em','b','i']);

  function temizNode(node) {
    if (node.nodeType === 3) return node.textContent;
    if (node.nodeType !== 1) return '';
    const tag = node.tagName.toLowerCase();
    if (tag === 'h1') return ''; // Başlık zaten üstte
    const children = Array.from(node.childNodes).map(temizNode).join('');
    if (!children.trim()) return '';
    if ((tag === 'p' || tag === 'div') && children.trim().length < 40) return '';
    if (izinli.has(tag)) return `<${tag}>${children}</${tag}>`;
    if (['div','section','article','main'].includes(tag)) {
      const txt = children.trim();
      return txt.length > 60 ? txt : '';
    }
    return children;
  }

  return Array.from(el.childNodes).map(temizNode).join('')
    .replace(/<(p|h[2-4]|li)>\s*<\/\1>/g,'')
    .replace(/  +/g,' ')
    .trim();
}

async function readerRenderTab(tab, haber) {
  const body = document.getElementById('readerBody');
  const cfg = LANG_CONFIG[lang];
  const catMap = CATEGORY_MAP[lang];
  const proxied = proxyImg(haber.gorsel);
  const timeAgo = haber.tarih ? Math.round((Date.now()-(haber.tarih.toDate?haber.tarih.toDate().getTime():new Date(haber.tarih).getTime()))/3600000) : '';
  const catLabel = catMap[haber.kategori]||haber.kategori||'';

  const heroHtml = proxied
    ? `<img class="reader-hero" src="${proxied}" alt="" onerror="this.outerHTML='<div class=reader-hero-placeholder></div>'">`
    : '<div class="reader-hero-placeholder"></div>';
  const metaHtml = `<div class="reader-content">
    <div class="reader-meta"><span class="reader-src">${haber.kaynak||''}</span><span class="reader-time">${timeAgo} ${cfg.ago}</span><span class="reader-cat">${catLabel}</span></div>
    <div class="reader-title">${haber.baslik}</div>
    <div class="reader-divider"></div>`;

  if (tab === 'ozet') {
    const ozetField = 'ozet_'+lang;
    // Firebase cache'den varsa direkt göster
    if (haber[ozetField]) {
      body.innerHTML = heroHtml + metaHtml + `<div class="reader-summary-text">${haber[ozetField]}</div></div>`;
      return;
    }
    body.innerHTML = heroHtml + metaHtml + `<div class="reader-loading-msg"><div class="spin"></div> ${cfg.ozetLoading}</div></div>`;
    try {
      // Firebase'deki icerik alanını kullan — proxy'ye gerek yok
      const icerik = (haber.icerik || '').slice(0, 3000);
      const gonderi = icerik
        ? `${cfg.ozetPrompt}

Headline: ${haber.baslik}
Source: ${haber.kaynak||''}

Article:
${icerik}`
        : `${cfg.ozetPrompt}

Headline: ${haber.baslik}
Source: ${haber.kaynak||''}`;
      const res = await fetch('https://img.lensflow.news/ozet', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({prompt: gonderi, lang})
      });
      if (res.ok) {
        const data = await res.json();
        const ozet = data.ozet||'';
        haber[ozetField] = ozet;
        try { await updateDoc(doc(db,'haberler',haber.id),{[ozetField]:ozet}); } catch(e) {}
        const el = body.querySelector('.reader-loading-msg');
        if (el) { el.outerHTML = `<div class="reader-summary-text">${ozet}</div>`; }
      } else {
        const el = body.querySelector('.reader-loading-msg');
        if(el) el.outerHTML = `<div class="reader-summary-text" style="color:var(--text3)">${cfg.ozetErr}</div>`;
      }
    } catch(e) {
      const el = body.querySelector('.reader-loading-msg');
      if(el) el.outerHTML = `<div class="reader-summary-text" style="color:var(--text3)">${cfg.ozetErr}</div>`;
    }
  } else if (tab === 'okuma') {
    body.innerHTML = heroHtml + metaHtml + `<div class="reader-loading-msg" id="articleContent"><div class="spin"></div> ${cfg.okumaLoading}</div></div>`;
    const el = document.getElementById('articleContent');

    if (!haber.link || haber.link === '#') {
      if(el) { el.className='reader-article'; el.innerHTML=`<p style="color:var(--text3)">${cfg.okumaErr}</p>`; }
    } else {
      // 1. Adım: Normal proxy ile dene
      let article = '';
      try {
        const res1 = await fetch('https://img.lensflow.news/?url='+encodeURIComponent(haber.link));
        if (res1.ok) {
          const html1 = await res1.text();
          article = icerikCikar(html1);
        }
      } catch(e) {}

      if (article && article.trim().length > 100) {
        // Proxy başarılı
        if(el) { el.className='reader-article'; el.innerHTML=article; }
      } else {
        // 2. Adım: Proxy başarısız — /icerik endpoint'i ile daha agresif dene
        try {
          const res2 = await fetch('https://img.lensflow.news/icerik', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({url: haber.link})
          });
          if (res2.ok) {
            const data2 = await res2.json();
            if (data2.ok && data2.html) {
              article = icerikCikar(data2.html);
            }
          }
        } catch(e) {}

        if (article && article.trim().length > 100) {
          if(el) { el.className='reader-article'; el.innerHTML=article; }
        } else {
          // Her iki yöntem de başarısız — hata mesajı
          if(el) { el.className='reader-article'; el.innerHTML=`<p style="color:var(--text3)">${cfg.okumaErr}</p>`; }
        }
      }
    }
  }
}

// LF global namespace
window.LF = {
  news: [],
  currentHaber: null,
  currentTab: 'ozet',

  openReader(haber) {
    if (!haber) return;
    this.currentHaber = haber;
    this.currentTab = 'ozet';
    const cfg = LANG_CONFIG[lang];
    document.getElementById('tabOzet').textContent = cfg.rdrOzet;
    document.getElementById('tabOkuma').textContent = cfg.rdrOkuma;
    document.getElementById('tabKaynak').textContent = cfg.rdrKaynak;
    // icerikVar yoksa Okuma Modu sekmesini gizle
    const tabOkuma = document.getElementById('tabOkuma');
    if (haber.icerikVar === true) {
      tabOkuma.style.display = '';
    } else {
      tabOkuma.style.display = 'none';
    }
    document.getElementById('readerOverlay').classList.add('open');
    document.getElementById('readerPanel').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.querySelector('.navbar').style.zIndex = '1';
    document.querySelector('.ticker') && (document.querySelector('.ticker').style.zIndex = '1');
    document.querySelectorAll('.reader-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tabOzet').classList.add('active');
    readerRenderTab('ozet', haber);
  },

  switchTab(tab) {
    if (!this.currentHaber) return;
    if (tab === 'kaynak') {
      window.open(this.currentHaber.link||'#','_blank');
      return;
    }
    this.currentTab = tab;
    document.querySelectorAll('.reader-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    readerRenderTab(tab, this.currentHaber);
  },

  closeReader() {
    document.getElementById('readerOverlay').classList.remove('open');
    document.getElementById('readerPanel').classList.remove('open');
    document.body.style.overflow = '';
    document.querySelector('.navbar').style.zIndex = '';
    document.querySelector('.ticker') && (document.querySelector('.ticker').style.zIndex = '');
  },

  setFilter(f) {
    // 'Tümü' veya cfg.allKey gelirse null yap
    activeFilter = (f==='Tümü'||f===LANG_CONFIG[lang].allKey) ? null : f;
    document.querySelectorAll('.fbtn').forEach(b => {
      const key = b.getAttribute('onclick').match(/'([^']+)'/)?.[1];
      b.classList.toggle('active', key===f);
    });
    renderGrid();
  }
};
